services:
  db:
    image: postgres:15-alpine
    container_name: transitops_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: transitops
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: transitops_backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/transitops?schema=public
      - JWT_SECRET=supersecretjwtkey
      - PORT=5000
      - FRONTEND_URL=http://localhost
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: transitops_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
